</g>
<g class="edge-label" data-from="Processing" data-to="Failed" data-label="error">
  <rect x="139.84816666666666" y="349.1" width="43.786" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="161.74116666666666" y="364.25" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">error</text>
</g>
<g class="edge-label" data-from="Failed" data-to="Idle" data-label="retry">
  <rect x="195.84183333333334" y="349.1" width="41.41" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="216.54683333333332" y="364.25" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">retry</text>
</g>
<g class="node" data-id="_start" data-label="" data-shape="state-start">
  <circle cx="161.25699999999998" cy="54" r="12" fill="var(--_text)" stroke="none" />
</g>
<g class="node" data-id="Idle" data-label="Idle" data-shape="rounded">
  <rect x="129.908" y="116" width="62.69799999999999" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="161.25699999999998" y="134.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Idle</text>
</g>
<g class="node" data-id="Processing" data-label="Processing" data-shape="rounded">
  <rect x="55.05399999999999" y="269.20000000000005" width="111.604" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="110.856" y="287.65000000000003" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Processing</text>
</g>
<g class="node" data-id="Success" data-label="Success" data-shape="rounded">
  <rect x="40" y="422.40000000000003" width="95.30199999999999" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="87.651" y="440.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Success</text>
</g>
<g class="node" data-id="Failed" data-label="Failed" data-shape="rounded">
  <rect x="163.4488333333333" y="422.40000000000003" width="79" height="36.900000000000006" rx="6" ry="6" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="202.9488333333333" y="440.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Failed</text>
</g>
<g class="node" data-id="_end" data-label="" data-shape="state-end">
  <circle cx="87.651" cy="521.3" r="12" fill="none" stroke="var(--_text)" stroke-width="1.5" />
  <circle cx="87.651" cy="521.3" r="8" fill="var(--_text)" stroke="none" />
</g>
</svg>