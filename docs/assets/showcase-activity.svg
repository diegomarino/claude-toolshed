  <polygon points="173.014,209.8 224.514,261.3 173.014,312.8 121.51400000000001,261.3" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="173.014" y="261.3" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Valid?</text>
</g>
<g class="node" data-id="D" data-label="Process Data" data-shape="rectangle">
  <rect x="40" y="429.1" width="122.71900000000001" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="101.3595" y="447.55" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Process Data</text>
</g>
