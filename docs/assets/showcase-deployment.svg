  <rect x="427.35900000000004" y="130.45" width="107.899" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="481.30850000000004" y="148.89999999999998" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">API Server</text>
</g>
<g class="node" data-id="D" data-label="PostgreSQL" data-shape="cylinder">
  <rect x="627.258" y="91" width="116.04999999999998" height="36.900000000000006" fill="var(--_node-fill)" stroke="none" />
  <line x1="627.258" y1="91" x2="627.258" y2="127.9" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <line x1="743.308" y1="91" x2="743.308" y2="127.9" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <ellipse cx="685.283" cy="127.9" rx="58.02499999999999" ry="7" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
