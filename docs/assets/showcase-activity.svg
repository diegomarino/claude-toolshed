<g class="edge-label" data-from="C" data-to="D" data-label="Yes">
  <rect x="82.8595" y="355.8" width="36.658" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="101.1885" y="370.95" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">Yes</text>
</g>
