  <rect x="45.18700000000001" y="514" width="112.345" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="101.35950000000001" y="532.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Save Result</text>
</g>
<g class="node" data-id="G" data-label="End" data-shape="stadium">
  <rect x="140.183" y="598.9" width="65.662" height="36.900000000000006" rx="18.450000000000003" ry="18.450000000000003" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="173.014" y="617.35" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">End</text>
</g>
</svg>