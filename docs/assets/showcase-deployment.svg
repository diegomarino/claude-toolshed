  <rect x="627.258" y="169.9" width="76.036" height="36.900000000000006" fill="var(--_node-fill)" stroke="none" />
  <line x1="627.258" y1="169.9" x2="627.258" y2="206.8" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <line x1="703.2940000000001" y1="169.9" x2="703.2940000000001" y2="206.8" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <ellipse cx="665.2760000000001" cy="206.8" rx="38.018" ry="7" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <ellipse cx="665.2760000000001" cy="169.9" rx="38.018" ry="7" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="665.2760000000001" y="188.35000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Redis</text>
</g>
</svg>